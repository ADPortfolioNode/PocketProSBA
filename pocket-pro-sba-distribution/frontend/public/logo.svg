<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="PocketPro SBA">
  <defs>
    <linearGradient id="ppg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="55%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="pps" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#1d4ed8" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- soft tile -->
  <rect width="64" height="64" rx="16" fill="#eff6ff"/>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="none" stroke="#dbeafe" stroke-width="1"/>
  <!-- mark -->
  <circle cx="32" cy="30" r="15" fill="url(#ppg)" filter="url(#pps)"/>
  <circle cx="32" cy="30" r="6.5" fill="#ffffff"/>
  <!-- pocket arc -->
  <path d="M17 50c4.5-9 11-13.5 15-13.5S42.5 41 47 50"
        fill="none" stroke="url(#ppg)" stroke-width="3.2" stroke-linecap="round"/>
  <!-- SBA accent bar -->
  <rect x="22" y="54" width="20" height="3" rx="1.5" fill="#2563eb" opacity="0.85"/>
</svg>
