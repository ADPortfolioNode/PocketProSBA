server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Backend API (browser calls same origin /api/*)
    location /api/ {
        # Handle CORS preflight at the edge when browser uses :3000 same-origin proxy
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH, HEAD" always;
            add_header Access-Control-Allow-Headers $http_access_control_request_headers always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        proxy_pass http://host.docker.internal:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        # Pass through CORS from backend when browser hits backend via proxy with Origin
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, Cache-Control, Pragma, Expires, Accept, Origin, X-Requested-With" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH, HEAD" always;
    }

    location /health {
        proxy_pass http://host.docker.internal:5000/api/health;
        proxy_set_header Host $host;
    }

    # Resources page: standalone click-to-load UI (avoids stale CRA SBA explorer)
    # /sba was the prebuilt SPA path that failed to render cards — serve live UI instead.
    location = /browse {
        try_files /resources.html =404;
    }
    location = /resources {
        try_files /resources.html =404;
    }
    # /sba stays on the SPA (index.html) so Programs / Lifecycle / Local tabs work.
    # Those tabs load cards from GET /api/sba/resources
    #   { sbaPrograms, businessLifecycleStages, localResourceTypes }.

    # Brand assets — never fall back to SPA HTML for missing images
    location ~* ^/(logo|favicon).*\.(svg|png|ico|webp|gif)$ {
        try_files $uri =404;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # Canonical animated logo (yinyang)
    location = /logo.gif {
        try_files /logo.gif /images/yinyang.gif =404;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # Legacy CRA / previous logo paths → yin-yang
    location = /logo.svg {
        try_files /logo.gif /images/yinyang.gif =404;
        default_type image/gif;
        expires 1d;
    }
    location = /logo192.png {
        try_files /logo192.png /logo.gif /images/yinyang.gif =404;
        expires 1d;
    }
    location = /logo512.png {
        try_files /logo512.png /logo.gif /images/yinyang.gif =404;
        expires 1d;
    }

    # React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
