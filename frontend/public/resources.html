<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#2563eb" />
  <title>SBA Resources · PocketPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f7fc;
      --surface: #ffffff;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --blue: #2563eb;
      --blue-deep: #1d4ed8;
      --soft: #eff6ff;
      --ok: #16a34a;
      --warn: #d97706;
      --radius: 18px;
      --shadow: 0 10px 30px -12px rgba(15, 23, 42, .18);
      --shadow-lg: 0 24px 50px -18px rgba(37, 99, 235, .28);
      --sidebar: 300px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0; min-height: 100vh; color: var(--ink);
      font-family: Inter, "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(1200px 500px at 10% -10%, #dbeafe 0%, transparent 55%),
        radial-gradient(900px 400px at 100% 0%, #e0e7ff 0%, transparent 50%),
        var(--bg);
    }
    a { color: var(--blue); text-decoration: none; }
    a:hover { color: var(--blue-deep); }
    .app { display: grid; grid-template-columns: var(--sidebar) 1fr; min-height: 100vh; }
    @media (max-width: 960px) { .app { grid-template-columns: 1fr; } .sidebar { position: sticky; top: 0; z-index: 20; } }

    /* Sidebar */
    .sidebar {
      background: rgba(255,255,255,.92); border-right: 1px solid var(--line);
      backdrop-filter: blur(10px); display: flex; flex-direction: column; max-height: 100vh;
    }
    .side-head { padding: 1rem 1rem .75rem; border-bottom: 1px solid var(--line); }
    .brand { display: flex; align-items: center; gap: .55rem; font-weight: 800; letter-spacing: -.02em; color: var(--ink); }
    .brand img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; box-shadow: 0 0 0 2px var(--soft); }
    .side-nav { display: flex; flex-wrap: wrap; gap: .35rem; margin-top: .75rem; }
    .chip {
      padding: .3rem .65rem; border-radius: 999px; border: 1px solid var(--line);
      background: #fff; color: var(--muted); font-size: .78rem; font-weight: 600;
    }
    .chip:hover, .chip.active { background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; border-color: transparent; }
    .side-body { padding: .75rem; overflow: auto; flex: 1; }
    .group-label {
      font-size: .68rem; letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); font-weight: 700; padding: .65rem .4rem .3rem;
    }
    .nav-item {
      width: 100%; text-align: left; border: 1px solid transparent; background: transparent;
      border-radius: 14px; padding: .7rem .75rem; cursor: pointer; display: flex; gap: .55rem;
      color: var(--ink); font: inherit; margin-bottom: .25rem;
    }
    .nav-item:hover { background: var(--soft); }
    .nav-item.active {
      background: linear-gradient(145deg, #eff6ff, #fff);
      border-color: #bfdbfe; box-shadow: var(--shadow);
    }
    .nav-item .ico { font-size: 1.2rem; line-height: 1.2; }
    .nav-item .name { font-weight: 700; font-size: .9rem; display: block; }
    .nav-item .desc {
      font-size: .72rem; color: var(--muted); display: block; margin-top: .12rem;
      font-family: ui-monospace, Consolas, monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .side-foot { padding: .75rem 1rem; border-top: 1px solid var(--line); font-size: .78rem; color: var(--muted); }

    /* Main */
    .main { min-width: 0; display: flex; flex-direction: column; }
    .topbar {
      position: sticky; top: 0; z-index: 15;
      display: flex; align-items: center; justify-content: space-between; gap: .75rem; flex-wrap: wrap;
      padding: .85rem 1.25rem; background: rgba(255,255,255,.86); border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }
    .search { display: flex; gap: .4rem; flex: 1; min-width: min(100%, 280px); max-width: 420px; }
    .search input {
      flex: 1; border: 1px solid var(--line); border-radius: 999px; padding: .55rem .95rem;
      font: inherit; outline: none; background: #fff;
    }
    .search input:focus { border-color: #93c5fd; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    .btn {
      border: none; border-radius: 999px; padding: .55rem 1rem; font: inherit; font-weight: 700; cursor: pointer;
      display: inline-flex; align-items: center; gap: .35rem;
    }
    .btn-primary { background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; box-shadow: 0 8px 18px rgba(37,99,235,.22); }
    .btn-ghost { background: #fff; border: 1px solid var(--line); color: var(--ink); }
    .btn-soft { background: var(--soft); color: var(--blue-deep); border: 1px solid #bfdbfe; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .content { padding: 1.1rem 1.25rem 2.5rem; max-width: 1100px; width: 100%; margin: 0 auto; }

    /* Topic hero — fully developed subject */
    .topic {
      background: linear-gradient(145deg, #ffffff 0%, #f8fbff 55%, #eef5ff 100%);
      border: 1px solid var(--line); border-radius: calc(var(--radius) + 4px);
      box-shadow: var(--shadow-lg); padding: 1.35rem 1.4rem 1.2rem; margin-bottom: 1rem;
      position: relative; overflow: hidden;
    }
    .topic::after {
      content: ""; position: absolute; right: -40px; top: -40px; width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(59,130,246,.18), transparent 70%); pointer-events: none;
    }
    .crumb { font-size: .82rem; color: var(--muted); margin-bottom: .45rem; display: flex; flex-wrap: wrap; gap: .35rem; align-items: center; }
    .crumb button {
      border: none; background: transparent; color: var(--blue); font: inherit; font-weight: 600; cursor: pointer; padding: 0;
    }
    .topic-title {
      margin: 0; font-size: clamp(1.45rem, 2.6vw, 1.9rem); letter-spacing: -.03em;
      display: flex; gap: .55rem; align-items: center; flex-wrap: wrap;
    }
    .topic-lead { margin: .55rem 0 0; color: var(--muted); line-height: 1.65; max-width: 70ch; font-size: .98rem; }
    .pill-row { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .75rem; }
    .pill {
      display: inline-flex; align-items: center; gap: .3rem; border-radius: 999px;
      padding: .22rem .65rem; font-size: .72rem; font-weight: 700; border: 1px solid var(--line); background: #fff;
    }
    .pill.route { font-family: ui-monospace, Consolas, monospace; color: var(--blue-deep); background: var(--soft); border-color: #bfdbfe; cursor: pointer; max-width: 100%; }
    .pill.ok { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
    .pill.warn { background: #fffbeb; color: #92400e; border-color: #fde68a; }
    .pill.muted { color: var(--muted); }
    .topic-actions { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: 1rem; }
    .sections { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: .65rem; margin-top: 1rem; }
    @media (max-width: 800px) { .sections { grid-template-columns: 1fr; } }
    .section-card {
      background: rgba(255,255,255,.85); border: 1px solid var(--line); border-radius: 14px; padding: .75rem .85rem;
    }
    .section-card h3 { margin: 0 0 .3rem; font-size: .88rem; }
    .section-card p { margin: 0; color: var(--muted); font-size: .82rem; line-height: 1.5; }

    /* Digestion pipeline */
    .digest {
      background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
      padding: .85rem 1rem; margin-bottom: 1rem; box-shadow: var(--shadow);
    }
    .digest-head { display: flex; justify-content: space-between; align-items: center; gap: .75rem; flex-wrap: wrap; margin-bottom: .65rem; }
    .digest-head strong { font-size: .92rem; }
    .pipeline { display: flex; flex-wrap: wrap; gap: .4rem; }
    .step {
      display: inline-flex; align-items: center; gap: .35rem; padding: .35rem .65rem;
      border-radius: 999px; border: 1px solid var(--line); background: #f8fafc; font-size: .75rem; font-weight: 600;
    }
    .step .dot { width: 8px; height: 8px; border-radius: 50%; background: #94a3b8; }
    .step.done .dot { background: var(--ok); }
    .step.warn .dot { background: var(--warn); }
    .step.empty .dot { background: #cbd5e1; }
    .stats { display: flex; flex-wrap: wrap; gap: .75rem 1.1rem; margin-top: .65rem; font-size: .82rem; color: var(--muted); }
    .stats b { color: var(--ink); }

    /* Filters + results toolbar */
    .toolbar {
      display: flex; justify-content: space-between; align-items: center; gap: .75rem; flex-wrap: wrap;
      margin-bottom: .75rem;
    }
    .facets { display: flex; flex-wrap: wrap; gap: .35rem; }
    .facet {
      border: 1px solid var(--line); background: #fff; border-radius: 999px; padding: .35rem .7rem;
      font: inherit; font-size: .8rem; font-weight: 600; color: var(--muted); cursor: pointer;
    }
    .facet.active, .facet:hover { background: var(--soft); color: var(--blue-deep); border-color: #bfdbfe; }
    .view-toggle { display: flex; gap: .3rem; }
    .view-toggle .btn { padding: .4rem .7rem; font-size: .8rem; }

    /* Results */
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: .85rem; }
    .grid.list { grid-template-columns: 1fr; }
    @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } }
    .card {
      border: 1px solid var(--line); border-radius: var(--radius); background: #fff;
      padding: 1rem 1.05rem; text-align: left; font: inherit; color: inherit; width: 100%;
      cursor: pointer; display: flex; flex-direction: column; gap: .45rem; min-height: 168px;
      transition: transform .14s ease, box-shadow .14s ease, border-color .14s ease;
      position: relative;
    }
    .card:hover { transform: translateY(-2px); border-color: #93c5fd; box-shadow: var(--shadow); }
    .card.expanded { min-height: 0; border-color: #93c5fd; box-shadow: var(--shadow); }
    .card-top { display: flex; justify-content: space-between; gap: .6rem; align-items: flex-start; }
    .card h3 { margin: 0; font-size: 1.02rem; letter-spacing: -.015em; line-height: 1.3; }
    .card p { margin: 0; color: var(--muted); font-size: .88rem; line-height: 1.55; flex: 1; }
    .card .more { color: var(--blue); font-weight: 700; font-size: .85rem; margin-top: auto; }
    .card-meta { font-size: .72rem; color: var(--muted); font-family: ui-monospace, Consolas, monospace; }
    .card-actions { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .25rem; }
    .card-actions .btn { padding: .35rem .7rem; font-size: .78rem; }

    .related {
      margin-top: 1.25rem; background: #fff; border: 1px solid var(--line);
      border-radius: var(--radius); padding: 1rem; box-shadow: var(--shadow);
    }
    .related h3 { margin: 0 0 .65rem; font-size: 1rem; }
    .related-list { display: flex; flex-wrap: wrap; gap: .45rem; }
    .related-list button {
      border: 1px solid var(--line); background: var(--soft); color: var(--blue-deep);
      border-radius: 999px; padding: .4rem .75rem; font: inherit; font-size: .8rem; font-weight: 600; cursor: pointer;
    }
    .related-list button:hover { background: #dbeafe; }

    .empty, .loading { text-align: center; padding: 2.75rem 1rem; color: var(--muted); }
    .spinner {
      width: 30px; height: 30px; border: 3px solid var(--soft); border-top-color: var(--blue);
      border-radius: 50%; margin: 0 auto .75rem; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .alert {
      border-radius: 12px; padding: .75rem 1rem; margin-bottom: .85rem; font-size: .9rem;
      border: 1px solid #bfdbfe; background: #eff6ff; color: var(--muted);
    }
    .alert.warn { border-color: #fde68a; background: #fffbeb; }
    .pager { display: flex; justify-content: center; gap: .5rem; margin-top: 1rem; align-items: center; }

    /* Modal leaf detail */
    .overlay {
      position: fixed; inset: 0; background: rgba(15,23,42,.5); display: none;
      align-items: center; justify-content: center; padding: 1rem; z-index: 60;
    }
    .overlay.open { display: flex; }
    .modal {
      width: min(720px, 100%); max-height: min(88vh, 800px); overflow: auto;
      background: #fff; border-radius: 22px; border: 1px solid var(--line);
      box-shadow: 0 28px 70px rgba(15,23,42,.3);
    }
    .modal-h { padding: 1.2rem 1.25rem .5rem; display: flex; justify-content: space-between; gap: 1rem; }
    .modal-h h2 { margin: 0; font-size: 1.25rem; letter-spacing: -.02em; }
    .modal-b { padding: .4rem 1.25rem 1.1rem; }
    .modal-f { padding: 0 1.25rem 1.2rem; display: flex; gap: .5rem; justify-content: flex-end; flex-wrap: wrap; }
    .x { border: none; background: var(--soft); width: 34px; height: 34px; border-radius: 999px; cursor: pointer; font-size: 1.15rem; }
    .meta { display: grid; grid-template-columns: 120px 1fr; gap: .4rem .75rem; font-size: .9rem; margin-top: .9rem; }
    .meta dt { color: var(--muted); margin: 0; }
    .meta dd { margin: 0; word-break: break-word; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="side-head">
        <a class="brand" href="/">
          <img src="/logo.gif" alt="" onerror="this.src='/images/yinyang.gif'" />
          PocketPro <span style="color:var(--blue)">SBA</span>
        </a>
        <nav class="side-nav">
          <a class="chip" href="/">Home</a>
          <a class="chip" href="/chat">Chat</a>
          <a class="chip active" href="/browse">Resources</a>
          <a class="chip" href="/sba">Programs</a>
          <a class="chip" href="/rag">RAG</a>
        </nav>
      </div>
      <div class="side-body" id="navList">
        <div class="loading"><div class="spinner"></div>Loading endpoints…</div>
      </div>
      <div class="side-foot" id="sideFoot">Recursive explore · child becomes next parent</div>
    </aside>

    <div class="main">
      <div class="topbar">
        <div style="display:flex;gap:.45rem;align-items:center;flex-wrap:wrap">
          <button type="button" class="btn btn-ghost" id="backBtn" style="display:none">← Back</button>
          <button type="button" class="btn btn-soft" id="refreshBtn">Refresh route</button>
        </div>
        <form class="search" id="searchForm">
          <label class="sr-only" for="searchInput">Filter results</label>
          <input id="searchInput" type="search" placeholder="Filter this topic…" disabled />
          <button class="btn btn-primary" type="submit" id="searchBtn" disabled>Search</button>
        </form>
      </div>

      <div class="content">
        <div id="alert" class="alert" style="display:none"></div>
        <div id="page">
          <div class="loading"><div class="spinner"></div>Preparing API digestion…</div>
        </div>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-h">
        <div>
          <h2 id="modalTitle">Details</h2>
          <div class="pill-row" id="modalPills"></div>
        </div>
        <button class="x" type="button" id="closeModal" aria-label="Close">×</button>
      </div>
      <div class="modal-b" id="modalBody"></div>
      <div class="modal-f">
        <button class="btn btn-ghost" type="button" id="closeModal2">Close</button>
        <button class="btn btn-soft" type="button" id="openRouteBtn" style="display:none">Open API route</button>
        <a class="btn btn-primary" id="modalLink" href="#" target="_blank" rel="noopener" style="display:none">Official source</a>
      </div>
    </div>
  </div>

  <script>
    /**
     * World-class API digestion browser
     * click endpoint → fetch route → digest topic → fully develop page
     */
    const ICONS = {
      loans: '💰', loan_types: '📋', articles: '📰', blogs: '✍️', courses: '🎓',
      documents: '📄', events: '📅', offices: '🏢', sbir: '🔬', lenders: '🏦', sources: '🛰️',
      lifecycle: '📌', programs: '💼', local: '📍', start: '🏁',
      contracting: '📝', disaster: '🚨'
    };

    const state = {
      nav: [],
      route: '',
      title: '',
      query: '',
      page: 1,
      totalPages: 1,
      items: [],
      allItems: [],
      topic: null,
      digestion: null,
      facet: 'all',
      view: 'grid', // grid | list
      history: [],
      expanded: {},
      meta: {},
    };

    const $ = (id) => document.getElementById(id);

    function escapeHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function showAlert(msg, warn) {
      const el = $('alert');
      if (!msg) { el.style.display = 'none'; return; }
      el.style.display = 'block';
      el.className = 'alert' + (warn ? ' warn' : '');
      el.textContent = msg;
    }

    function stripHtml(s) {
      return String(s == null ? '' : s)
        .replace(/<[^>]+>/g, ' ').replace(/&nbsp;/g, ' ').replace(/\s+/g, ' ').trim();
    }

    async function apiGet(path, params, timeoutMs) {
      const bases = [window.location.origin, 'http://127.0.0.1:5000', 'http://localhost:5000'];
      const ms = timeoutMs || 60000;
      let lastErr = null;
      for (const base of bases) {
        const controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
        const timer = controller ? setTimeout(function () { controller.abort(); }, ms) : null;
        try {
          const url = new URL(path, base);
          if (params) {
            Object.keys(params).forEach(function (k) {
              const v = params[k];
              if (v !== undefined && v !== null && v !== '') url.searchParams.set(k, v);
            });
          }
          const res = await fetch(url.toString(), {
            headers: { Accept: 'application/json' },
            signal: controller ? controller.signal : undefined,
          });
          if (!res.ok) { lastErr = new Error('HTTP ' + res.status); continue; }
          return await res.json();
        } catch (e) {
          lastErr = e && e.name === 'AbortError' ? new Error('Timed out: ' + path) : e;
        } finally {
          if (timer) clearTimeout(timer);
        }
      }
      throw lastErr || new Error('Failed ' + path);
    }

    /** Derive recursive child path under current parent route */
    function deriveChildPath(item, parentRoute) {
      if (!item) return '';
      let path = String(item.path || '').trim();
      if (path.indexOf('/api/') === 0) {
        // Don't re-open the same parent (infinite loop)
        if (parentRoute && path.replace(/\/$/, '') === String(parentRoute).replace(/\/$/, '')) return '';
        return path;
      }
      const id = item.id != null ? String(item.id) : '';
      const type = String(item.type || '').toLowerCase();
      const title = String(item.title || item.name || '');
      if (item.lifecycle_id) return '/api/sba/lifecycle/' + encodeURIComponent(item.lifecycle_id);
      if (/^sba loans$/i.test(title) || id === 'loans') return '/api/sba/content/loans';
      // Known loan ids
      if (['7a', '504', 'microloans', 'express', 'loans_hub', 'lender-match', 'working-capital', 'fixed-assets'].indexOf(id) >= 0) {
        return '/api/sba/content/loans/' + encodeURIComponent(id);
      }
      // Recurse under current API parent: /api/sba/content/X + /childId
      const parent = String(parentRoute || state.route || '').replace(/\/$/, '');
      if (parent.indexOf('/api/') === 0 && id && id.indexOf('item-') !== 0 && id.indexOf('-overview') < 0 && id.indexOf('-official') < 0) {
        // Skip pure leaf types that shouldn't recurse
        if (['overview', 'link', 'notice', 'source_status'].indexOf(type) >= 0) return '';
        // If parent already ends with this id, no deeper path
        if (parent.endsWith('/' + id) || parent.endsWith('/' + encodeURIComponent(id))) return '';
        // Only append one level under content/* or lifecycle/*
        if (/\/api\/sba\/(content|lifecycle)(\/|$)/.test(parent)) {
          return parent + '/' + encodeURIComponent(id);
        }
      }
      return '';
    }

    function normalizeItem(raw, index, parentRoute) {
      if (!raw || typeof raw !== 'object') {
        const text = stripHtml(raw);
        if (!text) return null;
        return { id: 'item-' + index, title: text.slice(0, 120), description: text, url: '', path: '', type: 'content', resources: [], drillable: false };
      }
      let title = stripHtml(raw.title || raw.name || raw.label || raw.type || '');
      let description = stripHtml(raw.description || raw.summary || raw.teaser || raw.message || raw.body || '');
      const url = String(raw.url || raw.link || raw.href || '').trim();
      if (!title && description) title = description.slice(0, 90) + (description.length > 90 ? '…' : '');
      if (!title) title = 'SBA resource ' + (index + 1);
      if (!description) description = title;
      const lifecycleId = raw.lifecycle_id || '';
      const id = raw.id != null ? String(raw.id) : ('item-' + index);
      const type = raw.type || 'content';
      let path = String(raw.path || '').trim();
      if (!path && lifecycleId) path = '/api/sba/lifecycle/' + lifecycleId;
      const provisional = {
        id: id, title: title, name: title, path: path, type: type, lifecycle_id: lifecycleId,
      };
      if (!path) path = deriveChildPath(provisional, parentRoute || state.route);
      // Never point child at the page we're already on
      if (path && parentRoute && path.replace(/\/$/, '') === String(parentRoute).replace(/\/$/, '')) {
        path = '';
      }
      const resources = Array.isArray(raw.resources) ? raw.resources : [];
      const drillable = !!raw.drillable || path.indexOf('/api/') === 0;
      const fileUrl = String(raw.fileUrl || raw.file_url || '').trim();
      const registrationLink = String(raw.registrationLink || raw.registration_link || '').trim();
      return {
        id: id,
        title: title,
        description: description,
        body: raw.body || '',
        url: url,
        path: path,
        type: type,
        is_current: raw.is_current,
        source: raw.source || '',
        resources: resources,
        lifecycle_id: lifecycleId,
        drillable: drillable,
        has_children: !!raw.has_children || resources.length > 0 || drillable,
        actions: Array.isArray(raw.actions) ? raw.actions : [],
        fileUrl: fileUrl,
        registrationLink: registrationLink,
        phase: raw.phase || '',
        icon: raw.icon || '',
        parent_path: raw.parent_path || parentRoute || '',
      };
    }

    function extractItems(data, parentRoute) {
      const parent = parentRoute || state.route || '';
      if (!data || typeof data !== 'object') return [];
      if (Array.isArray(data.items)) return data.items.map(function (raw, i) { return normalizeItem(raw, i, parent); }).filter(Boolean);
      if (Array.isArray(data.results)) return data.results.map(function (raw, i) { return normalizeItem(raw, i, parent); }).filter(Boolean);
      if (Array.isArray(data.available_loan_types)) {
        return data.available_loan_types.map(function (t, i) {
          return normalizeItem({
            id: 'loan-type-' + i,
            title: t.type || t.name || t.title,
            description: [t.description, t.max_amount && ('Max: ' + t.max_amount)].filter(Boolean).join(' · '),
            url: t.url || '', type: 'loan_type', is_current: t.is_current,
          }, i, parent);
        }).filter(Boolean);
      }
      if (data.sba_html || data.sbir_api || data.legacy_content_api !== undefined || data.api_key_configured !== undefined) {
        return Object.keys(data).map(function (key, i) {
          const value = data[key];
          if (value && typeof value === 'object') {
            const parts = [
              value.base ? ('Base: ' + value.base) : null,
              value.status_code != null ? ('HTTP ' + value.status_code) : null,
              value.ok === true ? 'Healthy' : (value.ok === false ? 'Unavailable' : null),
              value.error ? String(value.error) : null,
            ].filter(Boolean);
            return normalizeItem({
              id: key, title: key.replace(/_/g, ' '), description: parts.join(' · ') || JSON.stringify(value),
              type: 'source_status', is_current: value.ok === true, url: value.base || '',
            }, i, parent);
          }
          return normalizeItem({ id: key, title: key.replace(/_/g, ' '), description: String(value), type: 'source_status' }, i, parent);
        }).filter(Boolean);
      }
      // Single detail object → one card (still explorables if path/url)
      if (data.title || data.name) {
        const one = normalizeItem(data, 0, parent);
        return one ? [one] : [];
      }
      return [];
    }

    /** Client-side digestion fallback if API lacks topic/digestion */
    function clientDigest(items, route, title, data) {
      const typeCounts = {};
      items.forEach(function (it) {
        const t = it.type || 'content';
        typeCounts[t] = (typeCounts[t] || 0) + 1;
      });
      const facets = [{ id: 'all', label: 'All', count: items.length }];
      Object.keys(typeCounts).sort().forEach(function (t) {
        facets.push({ id: t, label: t.replace(/_/g, ' ').replace(/\b\w/g, function (c) { return c.toUpperCase(); }), count: typeCounts[t] });
      });
      const top = items.slice(0, 4).map(function (i) { return i.title; }).filter(Boolean);
      const desc = (data && (data.description || data.message)) ||
        (items.length
          ? ('This topic surfaces ' + items.length + ' resources' + (top.length ? ('. Highlights: ' + top.join('; ')) : '.') + '.')
          : 'No resources returned for this route yet.');
      return {
        topic: {
          title: (data && data.topic && data.topic.title) || title || 'SBA Topic',
          description: (data && data.topic && data.topic.description) || desc,
          summary: desc,
          route: route,
          official_url: data && (data.url || data.official_url),
          sections: (data && data.topic && data.topic.sections) || [
            { id: 'overview', title: 'Overview', body: desc },
            { id: 'resources', title: 'Resources', body: items.length + ' items from the API.', count: items.length },
            { id: 'how', title: 'How to use', body: 'Click API-badged cards to open that route. Filter by type. Use official links for full detail.' },
          ],
          icon: data && data.icon,
          phase: data && data.phase,
        },
        digestion: (data && data.digestion) || {
          pipeline: [
            { id: 'resolve', label: 'Resolve route', status: 'done', detail: route },
            { id: 'fetch', label: 'Fetch API', status: 'done', detail: (data && data.source) || 'api' },
            { id: 'normalize', label: 'Normalize', status: 'done', detail: items.length + ' items' },
            { id: 'facet', label: 'Facet', status: 'done', detail: Object.keys(typeCounts).length + ' types' },
            { id: 'ready', label: 'Topic ready', status: items.length ? 'done' : 'empty', detail: 'render' },
          ],
          stats: {
            items: items.length,
            types: Object.keys(typeCounts).length,
            with_url: items.filter(function (i) { return i.url; }).length,
            with_path: items.filter(function (i) { return i.drillable; }).length,
            page: state.page,
            total_pages: state.totalPages,
          },
          facets: facets,
          related_routes: items.filter(function (i) { return i.drillable; }).slice(0, 8).map(function (i) {
            return { path: i.path, title: i.title, type: i.type };
          }),
          quality: {
            degraded: !!(data && data.degraded),
            is_current: !!(data && data.is_current),
            coverage: items.length ? Math.round(100 * items.filter(function (i) { return i.url; }).length / items.length) : 0,
          },
        },
      };
    }

    function writeHash(route, title, page, query) {
      const parts = ['r=' + encodeURIComponent(route || '')];
      if (title) parts.push('t=' + encodeURIComponent(title));
      if (page > 1) parts.push('p=' + page);
      if (query) parts.push('q=' + encodeURIComponent(query));
      const next = '#' + parts.join('&');
      if (location.hash !== next) history.pushState(null, '', next);
    }

    function readHash() {
      const h = (location.hash || '').replace(/^#/, '');
      if (!h) return null;
      const map = {};
      h.split('&').forEach(function (pair) {
        const i = pair.indexOf('=');
        if (i < 0) return;
        map[decodeURIComponent(pair.slice(0, i))] = decodeURIComponent(pair.slice(i + 1));
      });
      if (!map.r) return null;
      return { route: map.r, title: map.t || '', page: parseInt(map.p || '1', 10) || 1, query: map.q || '' };
    }

    async function openRoute(route, title, opts) {
      opts = opts || {};
      if (!route || route.indexOf('/api/') !== 0) {
        showAlert('Invalid API route: ' + route, true);
        return;
      }
      if (opts.pushHistory && state.route && state.route !== route) {
        state.history.push({ route: state.route, title: state.title });
      }
      if (opts.resetHistory) state.history = [];

      state.route = route;
      state.title = title || route;
      state.page = opts.page || 1;
      state.query = opts.query || '';
      state.facet = 'all';
      state.expanded = {};
      if (!opts.skipHash) writeHash(state.route, state.title, state.page, state.query);

      $('searchInput').disabled = false;
      $('searchBtn').disabled = false;
      $('searchInput').value = state.query;
      $('backBtn').style.display = state.history.length ? 'inline-flex' : 'none';
      $('page').innerHTML = '<div class="loading"><div class="spinner"></div>Digesting ' + escapeHtml(route) + '…</div>';
      showAlert('');
      renderNav();

      try {
        const isSimple = /\/(sources|lifecycle|programs|local-resources)(\/|$)/.test(route) || route.indexOf('sba-overview') >= 0;
        const params = isSimple ? {} : { page: state.page, query: state.query || undefined };
        if (opts.fresh) params.fresh = 1;
        const data = await apiGet(route, params, 60000);
        let items = extractItems(data, route);
        if (!items.length && data.stage && Array.isArray(data.stage.resources)) {
          items = data.stage.resources.map(function (r, i) { return normalizeItem(r, i, route); }).filter(Boolean);
        }
        // If API returned a single parent object without children, still render explore shell
        if (!items.length && (data.title || data.name || data.description)) {
          items = [normalizeItem(data, 0, route)].filter(Boolean);
        }
        state.allItems = items;
        state.items = items;
        state.totalPages = Number(data.totalPages || data.total_pages) || 1;
        state.meta = {
          source: data.source,
          is_current: data.is_current,
          degraded: data.degraded,
          message: data.message,
          freshness: data.freshness,
          retrieved_at: data.retrieved_at,
        };
        const digested = clientDigest(items, route, state.title, data);
        state.topic = digested.topic;
        state.digestion = digested.digestion;
        if (data.topic) state.topic = Object.assign({}, digested.topic, data.topic);
        if (data.digestion) state.digestion = Object.assign({}, digested.digestion, data.digestion);

        document.title = (state.topic.title || state.title) + ' · PocketPro SBA';
        $('sideFoot').textContent = items.length + ' results · ' + route;
        renderTopicPage();
      } catch (e) {
        console.error(e);
        $('page').innerHTML = '<div class="empty">Failed to digest this route.</div>';
        showAlert('Load failed for ' + route + ': ' + (e.message || e), true);
      }
    }

    function goBack() {
      const prev = state.history.pop();
      if (!prev) return;
      openRoute(prev.route, prev.title, { skipHash: false, pushHistory: false });
    }

    function applyFacetAndFilter() {
      let list = state.allItems.slice();
      if (state.facet && state.facet !== 'all') {
        list = list.filter(function (it) { return String(it.type) === state.facet; });
      }
      const q = (state.query || '').toLowerCase().trim();
      if (q) {
        list = list.filter(function (it) {
          return (it.title + ' ' + it.description + ' ' + (it.path || '')).toLowerCase().indexOf(q) >= 0;
        });
      }
      state.items = list;
    }

    function renderTopicPage() {
      applyFacetAndFilter();
      const t = state.topic || { title: state.title, description: '', sections: [] };
      const d = state.digestion || { pipeline: [], stats: {}, facets: [], related_routes: [], quality: {} };
      const q = d.quality || {};
      const stats = d.stats || {};

      let html = '';
      // TOPIC HERO — fully develop subject
      html += '<article class="topic">';
      html += '<div class="crumb">';
      if (state.history.length) {
        html += '<button type="button" id="crumbBack">← ' + escapeHtml(state.history[state.history.length - 1].title || 'Back') + '</button>';
        html += '<span>/</span>';
      }
      html += '<span>API topic</span><span>/</span><span>' + escapeHtml(t.title || state.title) + '</span></div>';
      html += '<h1 class="topic-title">' +
        (t.icon ? '<span>' + escapeHtml(t.icon) + '</span>' : '') +
        '<span>' + escapeHtml(t.title || state.title) + '</span></h1>';
      html += '<p class="topic-lead">' + escapeHtml(t.description || t.summary || '') + '</p>';
      html += '<div class="pill-row">';
      html += '<span class="pill route" id="routePill" title="Reload this route">' + escapeHtml(state.route) + '</span>';
      html += '<span class="pill">' + (state.allItems.length) + ' resources</span>';
      if (t.phase) html += '<span class="pill">' + escapeHtml(t.phase) + '</span>';
      if (q.is_current) html += '<span class="pill ok">Current</span>';
      if (q.degraded || state.meta.degraded) html += '<span class="pill warn">Degraded source</span>';
      if (state.meta.source) html += '<span class="pill muted">' + escapeHtml(String(state.meta.source)) + '</span>';
      if (stats.coverage != null || q.coverage != null) html += '<span class="pill muted">' + (q.coverage != null ? q.coverage : stats.coverage) + '% with official links</span>';
      html += '</div>';
      html += '<div class="topic-actions">';
      if (t.official_url) html += '<a class="btn btn-primary" href="' + escapeHtml(t.official_url) + '" target="_blank" rel="noopener">Official SBA page</a>';
      html += '<button type="button" class="btn btn-soft" id="heroRefresh">Re-digest API</button>';
      html += '<a class="btn btn-ghost" href="/sba">Programs &amp; lifecycle</a>';
      html += '</div>';
      if (t.sections && t.sections.length) {
        html += '<div class="sections">';
        t.sections.slice(0, 3).forEach(function (sec) {
          html += '<div class="section-card"><h3>' + escapeHtml(sec.title || 'Section') +
            (sec.count != null ? ' · ' + sec.count : '') + '</h3><p>' + escapeHtml(sec.body || '') + '</p></div>';
        });
        html += '</div>';
      }
      html += '</article>';

      // DIGESTION PIPELINE
      html += '<section class="digest" aria-label="API digestion">';
      html += '<div class="digest-head"><strong>API digestion pipeline</strong>';
      html += '<span class="pill muted">v' + (d.version || 1) + '</span></div>';
      html += '<div class="pipeline">';
      (d.pipeline || []).forEach(function (step) {
        html += '<span class="step ' + escapeHtml(step.status || 'done') + '" title="' + escapeHtml(step.detail || '') + '">' +
          '<span class="dot"></span>' + escapeHtml(step.label || step.id) +
          (step.detail ? ' · ' + escapeHtml(String(step.detail).slice(0, 40)) : '') +
          '</span>';
      });
      html += '</div>';
      html += '<div class="stats">';
      html += '<span><b>' + (stats.items != null ? stats.items : state.allItems.length) + '</b> items</span>';
      html += '<span><b>' + (stats.types != null ? stats.types : '—') + '</b> types</span>';
      html += '<span><b>' + (stats.with_path != null ? stats.with_path : '—') + '</b> drillable</span>';
      html += '<span><b>' + (stats.with_url != null ? stats.with_url : '—') + '</b> linked</span>';
      if (state.totalPages > 1) html += '<span>page <b>' + state.page + '/' + state.totalPages + '</b></span>';
      html += '</div></section>';

      // TOOLBAR
      html += '<div class="toolbar">';
      html += '<div class="facets" id="facets">';
      (d.facets || [{ id: 'all', label: 'All', count: state.allItems.length }]).forEach(function (f) {
        html += '<button type="button" class="facet' + (state.facet === f.id ? ' active' : '') + '" data-facet="' + escapeHtml(f.id) + '">' +
          escapeHtml(f.label) + ' <span style="opacity:.7">' + f.count + '</span></button>';
      });
      html += '</div>';
      html += '<div class="view-toggle">' +
        '<button type="button" class="btn ' + (state.view === 'grid' ? 'btn-soft' : 'btn-ghost') + '" data-view="grid">Cards</button>' +
        '<button type="button" class="btn ' + (state.view === 'list' ? 'btn-soft' : 'btn-ghost') + '" data-view="list">List</button>' +
        '</div></div>';

      // RESULTS
      if (!state.items.length) {
        html += '<div class="empty">No resources match this filter. Clear search or pick another type.</div>';
      } else {
        html += '<div class="grid' + (state.view === 'list' ? ' list' : '') + '" id="resultsGrid">';
        state.items.forEach(function (item, idx) {
          const open = !!state.expanded[item.id];
          const isClickableResource = !!(
            item.drillable ||
            item.has_children ||
            (item.path && item.path.indexOf('/api/') === 0) ||
            (item.resources && item.resources.length)
          );
          const cta = isClickableResource
            ? ('Explore children →')
            : 'Open details →';
          html += '<article class="card' + (open ? ' expanded' : '') + (isClickableResource ? ' clickable-resource' : '') + '" data-idx="' + idx + '" tabindex="0" role="button">';
          html += '<div class="card-top"><h3>' + escapeHtml(item.title) + '</h3><div class="pill-row" style="margin:0">';
          if (item.type) html += '<span class="pill">' + escapeHtml(item.type) + '</span>';
          if (isClickableResource) html += '<span class="pill route">Clickable</span>';
          if (item.drillable) html += '<span class="pill route">API</span>';
          if (item.is_current === true) html += '<span class="pill ok">Current</span>';
          html += '</div></div>';
          html += '<p>' + escapeHtml(open ? item.description : (item.description || '').slice(0, state.view === 'list' ? 360 : 200)) +
            ((!open && (item.description || '').length > 200) ? '…' : '') + '</p>';
          if (item.path) html += '<div class="card-meta">' + escapeHtml(item.path) + '</div>';
          if (open && item.body) html += '<div style="font-size:.88rem;color:var(--muted);margin-top:.25rem">' + item.body + '</div>';
          html += '<div class="card-actions">';
          if (isClickableResource) html += '<button type="button" class="btn btn-primary" data-act="route" data-idx="' + idx + '">Explore children</button>';
          // Usable content: forms, documents, registration, official pages
          if (item.fileUrl) {
            const formish = /form|document/i.test(String(item.type || '') + ' ' + String(item.title || ''));
            html += '<a class="btn btn-primary" href="' + escapeHtml(item.fileUrl) + '" target="_blank" rel="noopener" data-stop="1">' +
              (formish ? 'Open form / document' : 'Open document') + '</a>';
          }
          if (item.registrationLink) {
            html += '<a class="btn btn-soft" href="' + escapeHtml(item.registrationLink) + '" target="_blank" rel="noopener" data-stop="1">Register</a>';
          }
          if (item.url) html += '<a class="btn btn-ghost" href="' + escapeHtml(item.url) + '" target="_blank" rel="noopener" data-stop="1">Official</a>';
          (item.actions || []).forEach(function (act) {
            if (!act) return;
            const href = act.href || act.path || act.url || '';
            if (!href || href === item.url || href === item.fileUrl || href === item.registrationLink) return;
            if (String(href).indexOf('/api/') === 0) return; // explore handled by route btn
            if (String(href).indexOf('http') === 0) {
              html += '<a class="btn btn-ghost" href="' + escapeHtml(href) + '" target="_blank" rel="noopener" data-stop="1">' +
                escapeHtml(act.label || act.id || 'Open') + '</a>';
            }
          });
          html += '<button type="button" class="btn btn-soft" data-act="detail" data-idx="' + idx + '">Full detail</button>';
          html += '</div>';
          html += '<div class="more">' + cta + '</div>';
          html += '</article>';
        });
        html += '</div>';
      }

      if (state.totalPages > 1) {
        html += '<div class="pager">' +
          '<button class="btn btn-ghost" type="button" id="prevPage"' + (state.page <= 1 ? ' disabled' : '') + '>Prev</button>' +
          '<span class="pill">Page ' + state.page + ' / ' + state.totalPages + '</span>' +
          '<button class="btn btn-ghost" type="button" id="nextPage"' + (state.page >= state.totalPages ? ' disabled' : '') + '>Next</button>' +
          '</div>';
      }

      // RELATED ROUTES
      const related = d.related_routes || [];
      if (related.length) {
        html += '<section class="related"><h3>Related routes to digest next</h3><div class="related-list">';
        related.forEach(function (r, i) {
          html += '<button type="button" data-rel="' + i + '">' + escapeHtml(r.title || r.path) + '</button>';
        });
        html += '</div></section>';
      }

      $('page').innerHTML = html;
      bindTopicPage(related);
    }

    function bindTopicPage(related) {
      const crumbBack = $('crumbBack');
      if (crumbBack) crumbBack.addEventListener('click', goBack);
      const routePill = $('routePill');
      if (routePill) routePill.addEventListener('click', function () {
        openRoute(state.route, state.title, { page: state.page, query: state.query });
      });
      const heroRefresh = $('heroRefresh');
      if (heroRefresh) heroRefresh.addEventListener('click', function () {
        openRoute(state.route, state.title, { page: state.page, query: state.query, fresh: 1 });
      });

      document.querySelectorAll('.facet').forEach(function (btn) {
        btn.addEventListener('click', function () {
          state.facet = btn.getAttribute('data-facet') || 'all';
          renderTopicPage();
        });
      });
      document.querySelectorAll('[data-view]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          state.view = btn.getAttribute('data-view') || 'grid';
          renderTopicPage();
        });
      });

      document.querySelectorAll('.card').forEach(function (card) {
        card.addEventListener('click', function (e) {
          if (e.target.closest('[data-stop]')) return;
          const actBtn = e.target.closest('[data-act]');
          const idx = Number((actBtn || card).getAttribute('data-idx'));
          const item = state.items[idx];
          if (!item) return;
          if (actBtn) {
            e.stopPropagation();
            const act = actBtn.getAttribute('data-act');
            if (act === 'route') {
              const p = deriveChildPath(item, state.route) || item.path;
              if (p && p.indexOf('/api/') === 0) openRoute(p, item.title, { pushHistory: true });
              else onItemActivate(item);
              return;
            }
            if (act === 'detail') { openLeaf(item); return; }
          }
          onItemActivate(item);
        });
        card.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            const item = state.items[Number(card.getAttribute('data-idx'))];
            if (item) onItemActivate(item);
          }
        });
      });

      if ($('prevPage')) $('prevPage').addEventListener('click', function () {
        openRoute(state.route, state.title, { page: state.page - 1, query: state.query });
      });
      if ($('nextPage')) $('nextPage').addEventListener('click', function () {
        openRoute(state.route, state.title, { page: state.page + 1, query: state.query });
      });

      document.querySelectorAll('[data-rel]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          const r = related[Number(btn.getAttribute('data-rel'))];
          if (r && r.path) openRoute(r.path, r.title, { pushHistory: true });
        });
      });
    }

    function renderLocalParent(item, children) {
      state.history.push({ route: state.route, title: state.title });
      state.route = 'local://' + (item.id || item.title);
      state.title = item.title;
      state.allItems = children;
      state.items = children.slice();
      state.totalPages = 1;
      state.facet = 'all';
      state.expanded = {};
      const digested = clientDigest(children, state.route, state.title, {
        description: item.description,
        url: item.url,
        topic: {
          title: item.title,
          description: item.description,
          official_url: item.url,
          sections: [
            { id: 'overview', title: 'Overview', body: item.description || '' },
            { id: 'children', title: 'Children of this parent', body: children.length + ' items. Click any with Explore to go deeper.', count: children.length },
            { id: 'rule', title: 'Recursive explore', body: 'Each child can become the next parent when it has an API path or nested resources.' },
          ],
        },
      });
      state.topic = digested.topic;
      state.digestion = digested.digestion;
      $('backBtn').style.display = 'inline-flex';
      writeHash(state.route, state.title, 1, '');
      renderTopicPage();
    }

    function onItemActivate(item) {
      if (!item) return;
      // Recursive rule: child with resolvable path becomes the new parent page
      const nextPath = deriveChildPath(item, state.route) || (item.drillable ? item.path : '');
      if (nextPath && nextPath.indexOf('/api/') === 0 &&
          nextPath.replace(/\/$/, '') !== String(state.route || '').replace(/\/$/, '')) {
        openRoute(nextPath, item.title, { pushHistory: true });
        return;
      }
      // Nested resources[] → local parent page (still recursive)
      if (item.resources && item.resources.length) {
        const kids = item.resources.map(function (r, i) {
          return normalizeItem(typeof r === 'string' ? { title: r, description: r } : r, i, state.route);
        }).filter(Boolean);
        renderLocalParent(item, kids);
        return;
      }
      // Leaf: still promote to a one-node parent page (not a dead end) with actions
      if (!item.drillable && (item.url || item.description)) {
        const kids = [
          normalizeItem({
            id: (item.id || 'leaf') + '-about',
            title: 'About ' + item.title,
            description: item.description,
            url: item.url,
            type: 'overview',
          }, 0, state.route),
        ].filter(Boolean);
        if (item.url) {
          kids.push(normalizeItem({
            id: (item.id || 'leaf') + '-official',
            title: 'Official source',
            description: 'Open the official SBA (or partner) page for full detail.',
            url: item.url,
            type: 'link',
          }, 1, state.route));
        }
        // Offer jump back to known roots for continued explore
        kids.push(normalizeItem({
          id: 'root-loans',
          title: 'Browse SBA Loans',
          description: 'All SBA loan program types.',
          path: '/api/sba/content/loans',
          type: 'program',
        }, 2, state.route));
        kids.push(normalizeItem({
          id: 'root-contracting',
          title: 'Browse Government Contracting',
          description: 'Federal contracting programs and certifications.',
          path: '/api/sba/content/contracting',
          type: 'program',
        }, 3, state.route));
        renderLocalParent(item, kids);
        return;
      }
      openLeaf(item);
    }

    function openLeaf(item) {
      $('modalTitle').textContent = item.title || 'Details';
      $('modalPills').innerHTML =
        (item.type ? '<span class="pill">' + escapeHtml(item.type) + '</span>' : '') +
        (item.drillable ? '<span class="pill route">API</span>' : '') +
        (item.phase ? '<span class="pill">' + escapeHtml(item.phase) + '</span>' : '');
      let html = '<p style="color:var(--muted);line-height:1.65;white-space:pre-wrap;margin:0">' + escapeHtml(item.description || '') + '</p>';
      html += '<dl class="meta">';
      html += '<dt>ID</dt><dd>' + escapeHtml(item.id) + '</dd>';
      if (item.type) html += '<dt>Type</dt><dd>' + escapeHtml(item.type) + '</dd>';
      if (item.path) html += '<dt>Route</dt><dd><code>' + escapeHtml(item.path) + '</code></dd>';
      if (item.url) html += '<dt>URL</dt><dd><a href="' + escapeHtml(item.url) + '" target="_blank" rel="noopener">' + escapeHtml(item.url) + '</a></dd>';
      if (item.source) html += '<dt>Source</dt><dd>' + escapeHtml(item.source) + '</dd>';
      html += '</dl>';
      $('modalBody').innerHTML = html;
      const link = $('modalLink');
      if (item.url) { link.href = item.url; link.style.display = 'inline-flex'; }
      else link.style.display = 'none';
      const orb = $('openRouteBtn');
      if (item.drillable && item.path) {
        orb.style.display = 'inline-flex';
        orb.onclick = function () { closeModal(); openRoute(item.path, item.title, { pushHistory: true }); };
      } else orb.style.display = 'none';
      $('overlay').classList.add('open');
    }

    function closeModal() { $('overlay').classList.remove('open'); }

    function renderNav() {
      const groups = {};
      state.nav.forEach(function (r) {
        const g = r.group || 'Resources';
        (groups[g] = groups[g] || []).push(r);
      });
      const parts = [];
      Object.keys(groups).forEach(function (g) {
        parts.push('<div class="group-label">' + escapeHtml(g) + '</div>');
        groups[g].forEach(function (r) {
          const active = state.route === r.path;
          parts.push(
            '<button type="button" class="nav-item' + (active ? ' active' : '') + '" data-path="' + escapeHtml(r.path) + '" data-title="' + escapeHtml(r.name) + '">' +
              '<span class="ico">' + (r.icon || '📁') + '</span>' +
              '<span style="min-width:0"><span class="name">' + escapeHtml(r.name) + '</span>' +
              '<span class="desc" title="' + escapeHtml(r.path) + '">' + escapeHtml(r.path) + '</span></span>' +
            '</button>'
          );
        });
      });
      $('navList').innerHTML = parts.join('') || '<div class="empty">No endpoints.</div>';
      $('navList').querySelectorAll('.nav-item').forEach(function (btn) {
        btn.addEventListener('click', function () {
          openRoute(btn.getAttribute('data-path'), btn.getAttribute('data-title'), { resetHistory: true, page: 1 });
        });
      });
    }

    async function loadCatalog() {
      try {
        const data = await apiGet('/api/sba/resources');
        state.nav = (data.resources || []).filter(function (r) { return r && r.path; }).map(function (r) {
          return {
            id: r.id, name: r.name || r.id, path: r.path,
            group: r.group || 'Resources', icon: ICONS[r.icon || r.id] || '📁',
          };
        });
        // Program parents also appear here so badges always open their endpoint children
        state.nav.push(
          { id: 'programs', name: 'All SBA Programs', path: '/api/sba/programs', group: 'Programs', icon: '💼' },
          { id: 'lifecycle', name: 'Business Lifecycle', path: '/api/sba/lifecycle', group: 'Lifecycle', icon: '📌' },
          { id: 'start', name: 'Start a Business', path: '/api/sba/lifecycle/start', group: 'Lifecycle', icon: '🏁' },
          { id: 'plan', name: 'Plan Your Business', path: '/api/sba/lifecycle/plan', group: 'Lifecycle', icon: '📋' },
          { id: 'launch', name: 'Launch Your Business', path: '/api/sba/lifecycle/launch', group: 'Lifecycle', icon: '🚀' },
          { id: 'local', name: 'Local Resources', path: '/api/sba/local-resources', group: 'Connect', icon: '📍' }
        );
        renderNav();
        const fromHash = readHash();
        if (fromHash && fromHash.route.indexOf('/api/') === 0) {
          await openRoute(fromHash.route, fromHash.title || fromHash.route, {
            page: fromHash.page, query: fromHash.query, skipHash: true, resetHistory: true,
          });
        } else {
          // Default: SBA Loans parent so first view shows loan-type children
          const preferred = state.nav.find(function (r) { return r.id === 'loans'; }) ||
            state.nav.find(function (r) { return r.id === 'contracting'; }) || state.nav[0];
          if (preferred) await openRoute(preferred.path, preferred.name, { resetHistory: true });
        }
      } catch (e) {
        $('navList').innerHTML = '<div class="empty">Catalog failed.</div>';
        showAlert('Could not load /api/sba/resources: ' + (e.message || e), true);
      }
    }

    $('backBtn').addEventListener('click', goBack);
    $('refreshBtn').addEventListener('click', function () {
      if (state.route && state.route.indexOf('/api/') === 0) {
        openRoute(state.route, state.title, { page: state.page, query: state.query, fresh: 1 });
      } else loadCatalog();
    });
    $('searchForm').addEventListener('submit', function (e) {
      e.preventDefault();
      if (!state.route || state.route.indexOf('/api/') !== 0) return;
      // Server search when supported; always re-filter client-side too
      openRoute(state.route, state.title, { page: 1, query: $('searchInput').value.trim() });
    });
    $('closeModal').addEventListener('click', closeModal);
    $('closeModal2').addEventListener('click', closeModal);
    $('overlay').addEventListener('click', function (e) { if (e.target === $('overlay')) closeModal(); });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        if ($('overlay').classList.contains('open')) closeModal();
        else if (state.history.length) goBack();
      }
    });
    window.addEventListener('popstate', function () {
      const h = readHash();
      if (h && h.route && h.route.indexOf('/api/') === 0) {
        openRoute(h.route, h.title || h.route, { page: h.page, query: h.query, skipHash: true });
      }
    });

    loadCatalog();
  </script>
</body>
</html>
