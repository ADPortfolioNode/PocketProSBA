services:
  chromadb:
    build:
      context: .
      dockerfile: Dockerfile.chromadb
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
      - CHROMA_PERSIST_DIR=/chroma/chroma
      - UVICORN_WORKERS=2
      - TOKENIZERS_PARALLELISM=false
    user: chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: "no"

volumes:
  chromadb_data:
    driver: local