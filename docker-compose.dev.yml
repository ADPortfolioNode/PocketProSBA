services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: pocketpro-backend-dev
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - FLASK_ENV=development
      - PYTHONUNBUFFERED=1
      - PORT=5000
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - FRONTEND_URL=http://localhost:3000
      - SQLALCHEMY_DATABASE_URI=sqlite:////app/app.db
    volumes:
      - .:/app
      - ./uploads:/app/uploads
      - ./chromadb_data:/app/chromadb_data
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      - chromadb
    command: python run.py

  chromadb:
    # Use 0.5.3 server; backend client must be chromadb>=0.5.3 (0.4.x client breaks on 'dimension')
    image: chromadb/chroma:0.5.3
    container_name: chromadb-dev
    ports:
      - "8000:8000"
    volumes:
      - ./chromadb_data:/chroma/chroma
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/heartbeat')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Lightweight: serve existing frontend/build via nginx (no node rebuild; low RAM friendly)
  frontend:
    image: nginx:alpine
    container_name: pocketpro-frontend-dev
    ports:
      - "3000:80"
    volumes:
      - ./frontend/build:/usr/share/nginx/html:ro
      - ./frontend/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: pocketpro-dev-network
